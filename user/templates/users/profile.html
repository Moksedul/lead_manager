{% extends "main/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<style>
	.bg-top {
    background-color: rgba(0,58,58,0.4);
    border: 1px solid rgba(225,225,225,0.5);
    padding: 5px;
}


</style>
<div class="card card-body">
          <div class="media">
            <img style="height: 100px; width: auto;" class="rounded-circle account-img" src="{{ user.profile.image.url }}">
            <div class="media-body">
              <h4 >{{ user.first_name }} {{ user.last_name }}</h4>
              <p class="text-secondary">{{ user.email }}</p>
            </div>
          </div>
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <fieldset class="form-group">
                <h5 class="border-bottom mb-b">Profile Info</h5>
                {{ u_form|crispy }}
                {{ p_form|crispy }}
            </fieldset>
              <div><a href="{% url 'password_reset' %}">Reset Password</a></div>
            <div class="form-group">
                <button class="btn btn-sm btn-outline-info" type="submit">Update</button>
            </div>
        </form>
</div>
{% endblock content %}
